# Robot configuration parameters
robot:
  uwb_baseline: 0.4   # 左右UWB基站间距 (米)
  max_v: 1.0          # 最大线速度 (m/s)

# APF Parameters
apf:
  safe_radius: 0.6    # Safe radius for obstacle avoidance (meters)
  k_att: 1.2          # Attraction coefficient
  k_rep: 0.8          # Repulsion coefficient
  vortex_weight: 0.6  # Vortex force weight (turning amplitude)
  kp_w: 2.0           # Steering P-control coefficient

# Sensor ports and settings
hardware:
  uwb_left_port: '/dev/ttyUSB0'
  uwb_right_port: '/dev/ttyUSB1'
  uwb_baudrate: 115200
  sonar_left_trig: 23
  sonar_left_echo: 24
  sonar_right_trig: 17
  sonar_right_echo: 27