# Robot configuration parameters
robot:
  uwb_baseline: 0.6   # 左右UWB基站间距 (米)
  max_v: 0.3          # 最大线速度 (m/s)

# APF Parameters
apf:
  safe_radius: 0.5    # Safe radius for obstacle avoidance (meters)
  k_att: 1.2          # Attraction coefficient
  k_rep: 0.8          # Repulsion coefficient
  vortex_weight: 0.6  # Vortex force weight (turning amplitude)
  kp_w: 2.5
  kd_w: 1.5

# Sensor ports and settings
hardware:
  uwb_port: '/dev/ttyUSB0'  # Port of the ESP32
  uwb_baudrate: 115200
  sonar_left_trig: 23
  sonar_left_echo: 24
  sonar_mid_trig: 20
  sonar_mid_echo: 21
  sonar_right_trig: 17
  sonar_right_echo: 27
  sonar_moving_avg_window: 10
